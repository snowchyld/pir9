# Docker Compose for pir9
# Multi-container deployment with external PostgreSQL, Redis, and services
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up -d --build  # Rebuild and start
#   docker compose down           # Stop all services
#
# Database: External PostgreSQL 18 at 10.0.0.20:5433
#   Databases: pir9, pir9_imdb, pir9_musicbrainz (see ADR-006)
#
# Environment variables (create .env file or export):
#   PUID, PGID          - User/Group IDs for file permissions
#   TZ                  - Timezone (e.g., America/New_York)
#   PIR9_IMDB_ENABLED   - Enable IMDB service integration (default: true)


services:
  # ============================================================================
  # Frontend - nginx serving Web Components app
  # ============================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: pir9-frontend:latest
    container_name: pir9-frontend
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    ports:
      - "8989:80"
    networks:
      - pir9-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================================================
  # API - Rust backend server with PostgreSQL
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: pir9-api:latest
    container_name: pir9-api
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    command:
      - "--mode"
      - "server"
      - "--redis-url"
      - "redis://redis:6379"
    volumes:
      - ./config:/config
      - ./data:/data
      - ./logs:/logs
      - ./backups:/backups
      - ./cache:/app/cache
      - /volume1/Movies:/volume1/Movies
      - /volume1/Music:/volume1/Music
      - /volume1/Shows:/volume1/Shows
      - /volume1/Audiobooks:/volume1/Audiobooks
      - /volume1/downloads:/volume1/downloads
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - RUST_LOG=info,pir9=debug
      - PIR9_PORT=8989
      - PIR9_BIND=0.0.0.0
      - PIR9_DB_TYPE=postgres
      - PIR9_DB_CONNECTION=postgresql://pir9:pir9@10.0.0.20:5433/pir9
      - PIR9_IMDB_SERVICE_URL=http://imdb:8990
      - PIR9_IMDB_ENABLED=${PIR9_IMDB_ENABLED:-true}
      - PIR9_MB_URL=http://musicbrainz:8991
      - PIR9_TVDB_API_KEY=${PIR9_TVDB_API_KEY:-}
      - PIR9_TMDB_API_KEY=${PIR9_TMDB_API_KEY:-}
      - FANART_API=${FANART_API:-}
      - TZ=${TZ:-UTC}
    depends_on:
      redis:
        condition: service_healthy
      imdb:
        condition: service_healthy
      musicbrainz:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pir9-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Redis - Event bus for cross-container messaging
  # Exposed on port 6311 for external workers (Synology)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: pir9-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6311:6379"
    volumes:
      - redis-data:/data
    networks:
      - pir9-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # IMDB Service - Manages IMDB dataset sync and lookups
  # Database: External PostgreSQL at 10.0.0.20:5433/pir9_imdb
  # ============================================================================
  imdb:
    build:
      context: ./services/pir9-imdb
      dockerfile: Dockerfile
    image: pir9-imdb:latest
    container_name: pir9-imdb
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - ./tmp/imdb_data:/data/cache
    environment:
      - RUST_LOG=info,pir9_imdb=debug
      - PIR9_IMDB_PORT=8990
      - PIR9_IMDB_DB_URL=postgresql://pir9:pir9@10.0.0.20:5433/pir9_imdb
      - PIR9_TMDB_API_KEY=${PIR9_TMDB_API_KEY:-}
    networks:
      - pir9-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8990/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # MusicBrainz Service - Manages MusicBrainz dataset sync and lookups
  # Database: External PostgreSQL at 10.0.0.20:5433/pir9_musicbrainz
  # ============================================================================
  musicbrainz:
    build:
      context: ./services/pir9-musicbrainz
      dockerfile: Dockerfile
    image: pir9-musicbrainz:latest
    container_name: pir9-musicbrainz
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - ./tmp/musicbrainz_data:/data/cache
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - RUST_LOG=info,pir9_musicbrainz=debug
      - PIR9_MB_PORT=8991
      - PIR9_MB_DB_URL=postgresql://pir9:pir9@10.0.0.20:5433/pir9_musicbrainz
    networks:
      - pir9-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8991/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ============================================================================
  # Cover Art Cache - Caching proxy for MusicBrainz Cover Art Archive
  # ============================================================================
  coverart:
    build:
      context: ./services/cover-art-cache
      dockerfile: Dockerfile
    image: pir9-coverart:latest
    container_name: pir9-coverart
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - coverart-cache:/cover-art-cache
    networks:
      - pir9-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Cover Art Cleaner - Manages cover art cache size
  # ============================================================================
  coverart-cleaner:
    build:
      context: ./services/cover-art-cache
      dockerfile: Dockerfile.cleaner
    image: pir9-coverart-cleaner:latest
    container_name: pir9-coverart-cleaner
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      - PYTHONUNBUFFERED=1
      - COVER_ART_CACHE_MAX_SIZE_MB=10240
      - COVER_ART_CACHE_CLEAN_TO_MB=8192
      - COVER_ART_CACHE_CLEANUP_INTERVAL=300
    volumes:
      - coverart-cache:/cover-art-cache
    networks:
      - pir9-network

volumes:
  redis-data:
  coverart-cache:

networks:
  pir9-network:
    driver: bridge
