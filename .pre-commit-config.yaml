repos:
  # ── Fast checks (seconds) ─────────────────────────────────────────────

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  # Rust formatting
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false

  # Rust linting (matches `make lint` / CI)
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

  # Frontend lint + format (Biome 2.x)
  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: bash -c 'cd frontend && npx biome check src/'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false

  # Python linting (catches issues in any Python scripts/tooling)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Security scanning (heavier) ───────────────────────────────────────

  # Rust dependency audit (CVEs in Cargo.lock)
  - repo: local
    hooks:
      - id: cargo-audit
        name: cargo audit
        entry: cargo audit
        language: system
        files: Cargo\.(toml|lock)$
        pass_filenames: false

  # Semgrep static analysis (auto rules from Semgrep registry)
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep
        entry: semgrep --config auto --error
        language: system
        pass_filenames: false

  # Grype vulnerability scan (CVEs in lockfiles and binaries)
  - repo: local
    hooks:
      - id: grype
        name: grype
        entry: bash -c 'grype dir:. --only-fixed --fail-on medium'
        language: system
        files: (Cargo\.lock|package-lock\.json)$
        pass_filenames: false

  # UBS meta-scanner (Rust + JS scoped to source dirs)
  - repo: local
    hooks:
      - id: ubs
        name: ubs (ultimate bug scanner)
        entry: bash -c 'ubs --only=rust --ci src/ && ubs --only=js --ci frontend/src/'
        language: system
        pass_filenames: false

  # ── SBOM generation ────────────────────────────────────────────────────

  # Syft SBOM (CycloneDX — kept in repo, always reflects current deps)
  - repo: local
    hooks:
      - id: syft-sbom
        name: syft sbom
        entry: bash -c 'syft dir:. -o cyclonedx-json=sbom.cdx.json && git add sbom.cdx.json'
        language: system
        files: (Cargo\.lock|package-lock\.json)$
        pass_filenames: false
